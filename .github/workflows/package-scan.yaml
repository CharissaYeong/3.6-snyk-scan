# .github/workflows/package-scan-lambda.yml
name: Package Scan With Serverless Lambda
run-name: ${{ github.actor }} is performing code scans and ephemeral testing

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tf-ephemeral-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pre-deploy:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This job is automatically triggered by a ${{ github.event_name }} event."

  terraform-checks:
    runs-on: ubuntu-latest
    needs: [pre-deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Initialize Terraform (Modules Only)
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate -no-color

  snyk-scans:
    runs-on: ubuntu-latest
    needs: terraform-checks
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code Test (SAST - Scans lambda_function.py)
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Infrastructure as Code Test (IaC - Scans Terraform)
        run: snyk iac test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  terraform-create:
    needs: snyk-scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        run: terraform init

      - name: Terraform Plan & Apply
        run: |
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan

  terraform-wait:
    needs: terraform-create
    runs-on: ubuntu-latest
    steps:
      - name: Pause 30 seconds to verify lambda creation and test
        run: sleep 30

  terraform-destroy:
    needs: terraform-wait
    runs-on: ubuntu-latest
    if: always() && needs.terraform-create.result == 'success'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Terraform init
        run: terraform init

      - name: Terraform destroy
        run: terraform destroy -auto-approve